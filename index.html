<!DOCTYPE html>
<html class="dark" lang="ko">
<head>

    <meta http-equiv="Pragma" content="no-cache"/>
    <meta http-equiv="Expires" content="0"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>

    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#3b82f6",
                        "background-dark": "#0f172a",
                        "surface-dark": "#161B22",
                        "accent-gold": "#FDE68A",
                    },
                    fontFamily: {
                        display: ["Inter", "Noto Sans KR", "sans-serif"],
                    },
                },
            },
        };
    </script>
    <style>
        @media print {
            /* 인쇄 시 모든 UI 요소 숨김 */
            body * { visibility: hidden !important; }

            /* #printable-area와 그 자식만 표시 */
            #printable-area,
            #printable-area * {
                visibility: visible !important;
            }

            #printable-area {
                position: absolute !important;
                left: 0 !important;
                top: 0 !important;
                width: 100% !important;
                margin: 0 !important;
                padding: 15mm !important;
                background: white !important;
                border: none !important;
                border-radius: 0 !important;
                box-shadow: none !important;
                overflow: visible !important;
            }

            /* 인쇄 배경/색상 */
            body { background: white !important; margin: 0 !important; padding: 0 !important; }
            #printable-area .paper-grid { display: none !important; }

            /* 다크 테마 색상을 인쇄용으로 변환 */
            #printable-area,
            #printable-area table,
            #printable-area td,
            #printable-area th,
            #printable-area span,
            #printable-area p,
            #printable-area div,
            #printable-area h1,
            #printable-area h2,
            #printable-area h3,
            #printable-area h4 {
                color: #1a1a1a !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }

            #printable-area .bg-slate-800\/30,
            #printable-area .bg-slate-800\/50,
            #printable-area .bg-slate-800\/40,
            #printable-area .bg-slate-900 {
                background: #f8f9fa !important;
                border-color: #dee2e6 !important;
            }

            #printable-area .bg-slate-800\/30,
            #printable-area [class*="bg-slate"] {
                background: transparent !important;
            }

            #printable-area table {
                background: white !important;
                white-space: normal !important;
                min-width: 0 !important;
            }
            #printable-area td,
            #printable-area th {
                white-space: normal !important;
            }

            #printable-area .border-slate-700,
            #printable-area .border-slate-700\/50,
            #printable-area .border-slate-800,
            #printable-area .border-slate-600 {
                border-color: #ccc !important;
            }

            #printable-area .divide-slate-800 > * + * {
                border-color: #ddd !important;
            }

            /* 강조 색상 유지 */
            #printable-area .text-blue-400,
            #printable-area .text-blue-500 { color: #2563eb !important; }
            #printable-area .text-red-300 { color: #dc2626 !important; }
            #printable-area .text-pink-400,
            #printable-area .text-pink-300 { color: #db2777 !important; }
            #printable-area .text-emerald-400 { color: #059669 !important; }

            /* 최종 정산금 행 강조 */
            #printable-area tfoot tr:last-of-type,
            #printable-area .bg-slate-800\/40 {
                background: #f0f4ff !important;
            }

            /* 페이지 설정 */
            @page {
                size: A4 portrait;
                margin: 10mm;
            }
        }
    </style>
</head>
<body class="bg-background-dark font-display text-slate-100 min-h-screen">

    <!-- Header -->
    <header id="app-header" class="hidden border-b border-slate-800 bg-slate-900/50 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-full mx-auto px-4 md:px-6 h-14 md:h-16 flex items-center justify-between">
            <div class="flex items-center gap-4 md:gap-8">
                <!-- 모바일 메뉴 토글 -->
                <button id="btn-mobile-menu" class="md:hidden p-1.5 rounded-lg hover:bg-slate-800">
                    <span class="material-symbols-outlined text-slate-400">menu</span>
                </button>
                <div class="flex items-center gap-2">
                    <span class="material-symbols-outlined text-blue-500 text-2xl md:text-3xl">diamond</span>
                    <span class="font-bold text-lg md:text-xl tracking-tight">LUXE MGMT</span>
                </div>
                <nav class="hidden md:flex items-center gap-6">
                    <a data-page="dashboard" class="text-sm font-medium text-slate-400 hover:text-blue-500 transition-colors cursor-pointer">대시보드</a>
                    <a data-page="settlement" class="text-sm font-medium text-slate-400 hover:text-blue-500 transition-colors cursor-pointer">일일정산</a>
                    <a data-page="staff" class="text-sm font-medium text-slate-400 hover:text-blue-500 transition-colors cursor-pointer">직원관리</a>
                    <a data-page="inventory" class="text-sm font-medium text-slate-400 hover:text-blue-500 transition-colors cursor-pointer">주류관리</a>
                </nav>
            </div>
            <div class="flex items-center gap-2 md:gap-3">
                <span id="user-name" class="hidden"></span>
                <span id="user-role" class="hidden"></span>
                <button id="btn-logout" class="p-2 rounded-lg hover:bg-slate-800 transition-colors" title="로그아웃">
                    <span class="material-symbols-outlined text-slate-400 text-xl">logout</span>
                </button>
                <div id="user-avatar" class="h-9 w-9 rounded-lg bg-blue-500 flex items-center justify-center text-white cursor-pointer" title="">
                    <span class="material-symbols-outlined text-lg">person</span>
                </div>
            </div>
        </div>
    </header>

    <!-- Sidebar -->
    <aside id="app-sidebar" class="hidden fixed inset-y-0 left-0 z-40 w-64 bg-slate-900 border-r border-slate-800 transform -translate-x-full md:translate-x-0 transition-transform duration-200 flex-col pt-16 md:pt-16">
        <div class="p-4 md:p-6 flex-1 overflow-y-auto custom-scrollbar">
            <nav class="space-y-1">
                <a data-page="dashboard" class="flex items-center px-4 py-3 text-sm font-medium text-slate-400 hover:bg-slate-800 rounded-lg transition-colors cursor-pointer">
                    <span class="material-symbols-outlined mr-3 text-xl">dashboard</span> 대시보드
                </a>
                <a data-page="settlement" class="flex items-center px-4 py-3 text-sm font-medium text-slate-400 hover:bg-slate-800 rounded-lg transition-colors cursor-pointer">
                    <span class="material-symbols-outlined mr-3 text-xl">receipt_long</span> 일일정산
                </a>
                <a data-page="staff" class="flex items-center px-4 py-3 text-sm font-medium text-slate-400 hover:bg-slate-800 rounded-lg transition-colors cursor-pointer">
                    <span class="material-symbols-outlined mr-3 text-xl">groups</span> 직원관리
                </a>
                <a data-page="girls" class="flex items-center px-4 py-3 text-sm font-medium text-slate-400 hover:bg-slate-800 rounded-lg transition-colors cursor-pointer">
                    <span class="material-symbols-outlined mr-3 text-xl">woman</span> 아가씨 관리
                </a>
                <a data-page="inventory" class="flex items-center px-4 py-3 text-sm font-medium text-slate-400 hover:bg-slate-800 rounded-lg transition-colors cursor-pointer">
                    <span class="material-symbols-outlined mr-3 text-xl">liquor</span> 주류관리
                </a>
                <a data-page="credit" class="flex items-center px-4 py-3 text-sm font-medium text-slate-400 hover:bg-slate-800 rounded-lg transition-colors cursor-pointer">
                    <span class="material-symbols-outlined mr-3 text-xl">account_balance_wallet</span> 외상관리
                </a>
                <a data-page="expenses" class="flex items-center px-4 py-3 text-sm font-medium text-slate-400 hover:bg-slate-800 rounded-lg transition-colors cursor-pointer">
                    <span class="material-symbols-outlined mr-3 text-xl">shopping_cart</span> 지출관리
                </a>
                <div class="my-2 border-t border-slate-800"></div>
                <a data-page="settings" class="flex items-center px-4 py-3 text-sm font-medium text-slate-400 hover:bg-slate-800 rounded-lg transition-colors cursor-pointer">
                    <span class="material-symbols-outlined mr-3 text-xl">tune</span> 기초설정
                </a>
                <a data-page="accounts" class="flex items-center px-4 py-3 text-sm font-medium text-slate-400 hover:bg-slate-800 rounded-lg transition-colors cursor-pointer admin-only-nav">
                    <span class="material-symbols-outlined mr-3 text-xl">manage_accounts</span> 계정관리
                </a>
            </nav>
        </div>
        <div class="p-4 border-t border-slate-800">
            <p class="text-[10px] text-slate-600 text-center">LUXE MGMT v1.0</p>
        </div>
    </aside>

    <!-- 모바일 사이드바 오버레이 -->
    <div id="sidebar-overlay" class="hidden fixed inset-0 bg-black/50 z-30 md:hidden"></div>

    <!-- Main Content -->
    <div id="main-wrapper">
        <main id="app-content" class="min-h-screen flex items-center justify-center">
            <div id="app-loading" class="flex flex-col items-center gap-4 text-slate-400">
                <span class="material-symbols-outlined animate-spin text-4xl">progress_activity</span>
                <p class="text-sm">로딩 중...</p>
            </div>
        </main>
    </div>

    <!-- Footer -->
    <footer id="app-footer" class="hidden py-6 md:py-8 border-t border-slate-800/50 md:ml-64">
        <div class="max-w-[1600px] mx-auto px-4 md:px-6 flex flex-col md:flex-row justify-between items-center gap-4 text-slate-500 text-xs">
            <div>&copy; 2026 LUXE Entertainment Management System.</div>
        </div>
    </footer>

    <!-- Modal -->
    <div id="app-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 modal-backdrop">
        <div class="bg-slate-900 border border-slate-700 rounded-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto shadow-2xl">
            <div class="flex items-center justify-between p-4 md:p-6 border-b border-slate-800">
                <h3 id="modal-title" class="font-bold text-lg text-white"></h3>
                <button id="modal-close" class="p-1 hover:bg-slate-800 rounded-lg"><span class="material-symbols-outlined text-slate-400">close</span></button>
            </div>
            <div id="modal-body" class="p-4 md:p-6"></div>
            <div class="flex gap-3 p-4 md:p-6 border-t border-slate-800">
                <button id="modal-cancel" class="flex-1 py-2.5 border border-slate-700 rounded-xl text-sm font-medium hover:bg-slate-800 transition-colors">취소</button>
                <button id="modal-confirm" class="flex-1 py-2.5 bg-blue-500 hover:bg-blue-600 text-white rounded-xl text-sm font-bold transition-colors">확인</button>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed top-20 right-4 z-[110] flex flex-col items-end"></div>

    <!-- Scripts -->
    <script src="js/utils/format.js?v=46"></script>
    <script src="js/utils/period.js?v=46"></script>
    <script src="js/utils/export.js?v=46"></script>
    <script src="js/supabase.js?v=46"></script>
    <script src="js/db.js?v=46"></script>
    <script src="js/auth.js?v=53"></script>
    <script src="js/app.js?v=50"></script>
    <script src="js/pages/login.js?v=46"></script>
    <script src="js/pages/dashboard.js?v=46"></script>
    <script src="js/pages/settlement.js?v=60"></script>
    <script src="js/pages/credit.js?v=60"></script>
    <script src="js/pages/staff.js?v=46"></script>
    <script src="js/pages/inventory.js?v=46"></script>
    <script src="js/pages/girls.js?v=46"></script>
    <script src="js/pages/expenses.js?v=46"></script>
    <script src="js/pages/settings.js?v=46"></script>
    <script src="js/pages/accounts.js?v=46"></script>

    <script>
        // SPA Navigation
        document.addEventListener('DOMContentLoaded', () => {
            // 사이드바 & 헤더 네비게이션
            document.querySelectorAll('[data-page]').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    App.navigate(link.dataset.page);
                    // 모바일: 사이드바 닫기
                    closeMobileSidebar();
                });
            });

            // 로그아웃
            document.getElementById('btn-logout').addEventListener('click', async () => {
                if (confirm('로그아웃 하시겠습니까?')) {
                    await Auth.logout();
                }
            });

            // 모바일 메뉴
            document.getElementById('btn-mobile-menu').addEventListener('click', () => {
                const sidebar = document.getElementById('app-sidebar');
                const overlay = document.getElementById('sidebar-overlay');
                sidebar.classList.toggle('-translate-x-full');
                overlay.classList.toggle('hidden');
            });

            document.getElementById('sidebar-overlay').addEventListener('click', closeMobileSidebar);

            function closeMobileSidebar() {
                document.getElementById('app-sidebar').classList.add('-translate-x-full');
                document.getElementById('sidebar-overlay').classList.add('hidden');
            }

            // 앱 초기화 (async)
            App.init().catch(err => {
                console.error('App init error:', err);
                const loading = document.getElementById('app-loading');
                const content = document.getElementById('app-content');
                if (loading && content) {
                    loading.remove();
                    content.innerHTML = '<div class="flex flex-col items-center gap-4 text-center max-w-md px-4"><span class="material-symbols-outlined text-red-400 text-5xl">cloud_off</span><p class="text-slate-300">서버에 연결할 수 없습니다.</p><p class="text-slate-500 text-sm">인터넷 연결과 Supabase 설정을 확인한 후 새로고침해주세요.</p><button onclick="location.reload()" class="mt-4 px-6 py-2 bg-blue-500 hover:bg-blue-600 text-white rounded-lg font-bold">새로고침</button></div>';
                }
            });
        });
    </script>
</body>
</html>
